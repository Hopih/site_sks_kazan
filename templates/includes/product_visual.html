{% load static %}
{% if product.preview_image %}
<img src="{% static product.preview_image %}" alt="{{ product.name }}" class="product-preview-img{% if size == 'hero' %} product-preview-img-hero{% endif %}">
{% else %}
<div class="mesh-viewer{% if size == 'hero' %} mesh-viewer-hero{% endif %}" data-mesh-viewer data-size="{{ size|default:'small' }}" data-mesh-type="{{ product.mesh_type|default:product.category.mesh_type }}"></div>
{% endif %}
